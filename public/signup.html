<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="card">
    <h1>アカウント作成</h1>

    <input id="userCode" placeholder="ユーザーコード">
    <input id="display" placeholder="表示名">
    <input id="username" placeholder="Scratchユーザー名">
    <input id="password" type="password" placeholder="パスワード">

    <button onclick="signup()">作成</button>

    <p id="msg"></p>
</div>

<script>
async function signup() {
    const res = await fetch("/api/signup", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            userCode: userCode.value,
            display: display.value,
            username: username.value,
            password: password.value
        })
    });

    const json = await res.json();
    if (json.ok) location.href = "index.html";
    else msg.innerText = "作成できませんでした";
}
</script>
</body>
</html>

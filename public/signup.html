<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="card">
    <h1>アカウント作成</h1>

    <input id="username" placeholder="Scratchユーザー名">
    <input id="display" placeholder="表示名">
    <input id="password" type="password" placeholder="パスワード">

    <button onclick="signup()">作成</button>

    <p id="msg"></p>
</div>

<script>
async function signup() {
    const username = document.getElementById("username").value;
    const display = document.getElementById("display").value;
    const password = document.getElementById("password").value;

    const res = await fetch("/api/signup", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, display, password })
    });

    const json = await res.json();

    if (json.ok) {
        msg.innerText = "アカウント作成成功！";
        setTimeout(() => location.href = "index.html", 1000);
    } else {
        msg.innerText = "作成できませんでした: " + json.error;
    }
}
</script>
</body>
</html>
